name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancela ejecuciones antiguas del mismo branch si llega un push nuevo.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Type-check & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # `next build` ejecuta el chequeo de tipos de TypeScript y compila.
      # Si algo no tipa o no compila, el CI falla antes de llegar a Dokploy.
      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
